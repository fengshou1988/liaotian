<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>仿QQ聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
body{background:#e5e6eb;height:100vh;overflow:hidden;}

/* 登录框 */
.login{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999;}
.login-box{background:#fff;width:340px;padding:25px;border-radius:10px;}
.login h2{text-align:center;color:#128bf1;margin-bottom:20px;}
.login p{margin:12px 0;}
.login input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-top:4px;}
.login button{width:100%;padding:10px;background:#128bf1;color:#fff;border:none;border-radius:6px;margin-top:15px;cursor:pointer;}
.err{color:red;font-size:12px;margin-top:8px;}

/* 主布局 三栏 */
.main{display:flex;width:100%;height:100vh;display:none;}

/* 左侧导航 */
.left{width:60px;background:#222;display:flex;flex-direction:column;align-items:center;padding-top:15px;}
.avatar{width:40px;height:40px;border-radius:50%;background:#128bf1;color:#fff;line-height:40px;text-align:center;font-weight:bold;margin-bottom:20px;}
.nav-item{width:40px;height:40px;line-height:40px;text-align:center;color:#ccc;font-size:20px;margin:6px 0;border-radius:6px;cursor:pointer;}
.nav-item.active{background:#333;color:#fff;}

/* 中间会话列表 */
.mid{width:240px;background:#f7f8fa;border-right:1px solid #ddd;display:flex;flex-direction:column;}
.mid-top{height:48px;line-height:48px;padding:0 15px;font-weight:bold;border-bottom:1px solid #eee;background:#fff;}
.tab{display:flex;background:#fff;border-bottom:1px solid #eee;}
.tab span{flex:1;text-align:center;line-height:36px;font-size:14px;color:#666;cursor:pointer;}
.tab span.active{color:#128bf1;border-bottom:2px solid #128bf1;font-weight:bold;}
.session{flex:1;overflow:auto;}
.session-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #eee;cursor:pointer;}
.session-item.active{background:#e8f4ff;}
.s-ava{width:36px;height:36px;border-radius:50%;background:#ddd;line-height:36px;text-align:center;font-weight:bold;color:#666;}
.s-info{flex:1;margin-left:10px;overflow:hidden;}
.s-name{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-msg{font-size:12px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-time{font-size:11px;color:#bbb;}

/* 右侧聊天区 */
.right{flex:1;background:#fff;display:flex;flex-direction:column;}
.chat-title{height:48px;line-height:48px;padding:0 20px;font-weight:bold;border-bottom:1px solid #eee;}
.chat-content{flex:1;padding:15px;overflow:auto;background:#f7f8fa;}
.msg{margin:12px 0;display:flex;}
.msg.me{justify-content:flex-end;}
.msg-ava{width:36px;height:36px;border-radius:50%;background:#ddd;line-height:36px;text-align:center;font-weight:bold;color:#666;flex-shrink:0;}
.msg.me .msg-ava{order:2;margin-left:8px;}
.msg-text{max-width:60%;padding:8px 12px;border-radius:10px;word-break:break-all;}
.msg.other .msg-text{background:#fff;border:1px solid #ddd;margin-left:8px;}
.msg.me .msg-text{background:#128bf1;color:#fff;margin-right:8px;}
.time-line{text-align:center;font-size:12px;color:#aaa;margin:8px 0;}

/* 底部输入栏 */
.tool{height:38px;line-height:38px;padding:0 15px;border-top:1px solid #eee;}
.tool span{font-size:18px;margin-right:15px;color:#666;cursor:pointer;}
.input-area{height:110px;padding:10px 15px;border-top:1px solid #eee;display:flex;flex-direction:column;}
textarea{flex:1;border:none;outline:none;resize:none;font-size:14px;}
.send{align-self:flex-end;margin-top:8px;padding:6px 18px;background:#128bf1;color:#fff;border:none;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login" id="loginBox">
    <div class="login-box">
        <h2>账号登录</h2>
        <p>账号：<input type="text" id="uid" placeholder="user01 ~ user30"></p>
        <p>密码：<input type="password" id="pwd" placeholder="123456"></p>
        <div class="err" id="errTip"></div>
        <button onclick="login()">登 录</button>
    </div>
</div>

<!-- 主界面 仿QQ三栏 -->
<div class="main" id="mainBox">
    <!-- 左导航 -->
    <div class="left">
        <div class="avatar" id="myAva">U</div>
        <div class="nav-item active">💬</div>
        <div class="nav-item">👥</div>
        <div class="nav-item">⚙️</div>
    </div>

    <!-- 中间会话 -->
    <div class="mid">
        <div class="mid-top">消息</div>
        <div class="tab">
            <span class="active" onclick="switchTab('group')">群聊</span>
            <span onclick="switchTab('pri')">私聊</span>
        </div>
        <div class="session" id="sessionList"></div>
    </div>

    <!-- 右侧聊天 -->
    <div class="right">
        <div class="chat-title" id="chatTitle">请选择会话</div>
        <div class="chat-content" id="chatBox"></div>
        <div class="tool">
            <span title="表情">😊</span>
            <span title="文件">📎</span>
        </div>
        <div class="input-area">
            <textarea id="txt"></textarea>
            <button class="send" onclick="send()">发送</button>
        </div>
    </div>
</div>

<script>
// 账号列表
const userList = [];
for(let i=1;i<=30;i++){
    let n = i.toString().padStart(2,'0');
    userList.push({id:'user'+n,pwd:'123456'});
}

let nowUser = null;
let nowType = 'group';
let nowKey = '';
let msgData = JSON.parse(localStorage.getItem('chatData')) || {group1:[],group2:[]};

// DOM
const loginBox = document.getElementById('loginBox');
const mainBox = document.getElementById('mainBox');
const uid = document.getElementById('uid');
const pwd = document.getElementById('pwd');
const errTip = document.getElementById('errTip');
const myAva = document.getElementById('myAva');
const sessionList = document.getElementById('sessionList');
const chatTitle = document.getElementById('chatTitle');
const chatBox = document.getElementById('chatBox');
const txt = document.getElementById('txt');

// 登录
function login(){
    let u = uid.value.trim();
    let p = pwd.value.trim();
    let find = userList.find(x=>x.id===u && x.pwd===p);
    if(!find){
        errTip.innerText = '账号或密码错误';
        return;
    }
    nowUser = u;
    loginBox.style.display = 'none';
    mainBox.style.display = 'flex';
    myAva.innerText = u.slice(-2);
    renderSession();
}

// 切换标签 群聊/私聊
function switchTab(t){
    nowType = t;
    let tabs = document.querySelectorAll('.tab span');
    tabs[0].className = t==='group'?'active':'';
    tabs[1].className = t==='pri'?'active':'';
    renderSession();
}

// 渲染会话列表
function renderSession(){
    sessionList.innerHTML = '';
    let arr = [];
    if(nowType === 'group'){
        arr = [
            {key:'group1',name:'一群'},
            {key:'group2',name:'二群'}
        ];
    }else{
        arr = userList.filter(x=>x.id!==nowUser).map(x=>{
            let k = [nowUser,x.id].sort().join('_');
            return {key:'pri_'+k,name:x.id};
        });
    }
    arr.forEach(item=>{
        let div = document.createElement('div');
        div.className = 'session-item' + (item.key===nowKey?' active':'');
        div.onclick = ()=>openChat(item.key,item.name);
        div.innerHTML = `
            <div class="s-ava">${item.name.slice(-2)}</div>
            <div class="s-info">
                <div class="s-name">${item.name}</div>
                <div class="s-msg">${getLastMsg(item.key)}</div>
            </div>
        `;
        sessionList.appendChild(div);
    });
}

// 获取最后一条消息
function getLastMsg(key){
    if(!msgData[key]) return '暂无消息';
    let last = msgData[key][msgData[key].length-1];
    return last ? last.content : '暂无消息';
}

// 打开聊天窗口
function openChat(key,name){
    nowKey = key;
    chatTitle.innerText = name;
    renderSession();
    renderChat();
}

// 渲染聊天内容
function renderChat(){
    chatBox.innerHTML = '';
    let list = msgData[nowKey] || [];
    list.forEach(item=>{
        let cls = item.sender === nowUser ? 'msg me' : 'msg other';
        let div = document.createElement('div');
        div.className = cls;
        div.innerHTML = `
            <div class="msg-ava">${item.sender.slice(-2)}</div>
            <div class="msg-text">${item.content}</div>
        `;
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

// 发送消息
function send(){
    let content = txt.value.trim();
    if(!content || !nowKey) return;
    if(!msgData[nowKey]) msgData[nowKey] = [];
    msgData[nowKey].push({
        sender:nowUser,
        content:content
    });
    localStorage.setItem('chatData',JSON.stringify(msgData));
    txt.value = '';
    renderSession();
    renderChat();
}

// 多标签同步
window.addEventListener('storage',function(){
    msgData = JSON.parse(localStorage.getItem('chatData')) || {group1:[],group2:[]};
    renderSession();
    if(nowKey) renderChat();
});
</script>
</body>
</html>
