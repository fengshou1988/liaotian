<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全功能聊天系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#4F46E5' } } }
    }
  </script>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
<!-- 登录注册弹窗 -->
<div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
  <div class="bg-white rounded-2xl w-full max-w-md p-6">
    <div class="text-center mb-4">
      <h1 class="text-2xl font-bold text-primary">聊天交友系统</h1>
    </div>
    <div class="flex gap-2 mb-4">
      <button id="loginTab" class="flex-1 py-2 border-b-2 border-primary font-semibold">登录</button>
      <button id="regTab" class="flex-1 py-2 text-gray-500">注册</button>
    </div>
    <!-- 登录 -->
    <div id="loginBox" class="space-y-3">
      <input placeholder="账号(字母+数字)" id="loginAccount" class="w-full p-3 border rounded-lg">
      <input placeholder="密码" type="password" id="loginPwd" class="w-full p-3 border rounded-lg">
      <!-- 记住密码复选框 -->
      <div class="flex items-center gap-2">
        <input type="checkbox" id="rememberPwd" class="w-4 h-4">
        <label class="text-sm text-gray-600">记住账号密码</label>
      </div>
      <button onclick="login()" class="w-full bg-primary text-white p-3 rounded-lg">登录</button>
    </div>
    <!-- 注册 -->
    <div id="regBox" class="hidden space-y-3">
      <input placeholder="账号(必须字母+数字)" id="regAccount" class="w-full p-3 border rounded-lg">
      <input placeholder="密码" type="password" id="regPwd" class="w-full p-3 border rounded-lg">
      <button onclick="register()" class="w-full bg-primary text-white p-3 rounded-lg">注册</button>
    </div>
    <p id="tip" class="text-red-500 text-center mt-2"></p>
  </div>
</div>

<!-- 主界面 -->
<div id="main" class="hidden h-screen flex max-w-7xl mx-auto bg-white shadow-xl">
  <div class="w-72 border-r flex flex-col">
    <div class="p-4 border-b flex items-center gap-3 cursor-pointer" onclick="openProfile()">
      <img id="myAvatar" class="w-10 h-10 rounded-full">
      <div class="flex-1">
        <h3 id="myName" class="font-semibold"></h3>
        <p class="text-xs text-green-500">在线</p>
      </div>
    </div>
    <div class="p-3 flex gap-2">
      <button onclick="openAddFriend()" class="flex-1 p-2 bg-primary/10 text-primary rounded-lg">
        <i class="fa fa-user-plus mr-1"></i>加好友
      </button>
      <button onclick="openCreateGroup()" class="flex-1 p-2 bg-primary/10 text-primary rounded-lg">
        <i class="fa fa-users mr-1"></i>建群聊
      </button>
    </div>
    <div class="flex border-b">
      <button id="friendTab" class="flex-1 py-2 border-b-2 border-primary font-semibold">好友</button>
      <button id="groupTab" class="flex-1 py-2 text-gray-500">群聊</button>
    </div>
    <div id="list" class="flex-1 overflow-y-auto p-2"></div>
  </div>

  <div class="flex-1 flex flex-col">
    <div class="p-4 border-b flex items-center gap-3">
      <img id="chatAvatar" class="w-10 h-10 rounded-full">
      <div class="flex-1">
        <h3 id="chatTitle" class="font-semibold">选择聊天对象</h3>
      </div>
    </div>
    <div id="chatContent" class="flex-1 bg-gray-50 p-4 overflow-y-auto"></div>
    <div class="p-3 border-t flex items-center gap-2">
      <button onclick="openEmoji()" class="text-xl text-gray-500"><i class="fa fa-smile-o"></i></button>
      <button onclick="sendFile('image')" class="text-xl text-gray-500"><i class="fa fa-picture-o"></i></button>
      <button onclick="sendFile('file')" class="text-xl text-gray-500"><i class="fa fa-file-o"></i></button>
      <button onclick="recordVoice()" class="text-xl text-gray-500"><i class="fa fa-microphone"></i></button>
      <input id="msgInput" class="flex-1 p-2 border rounded-lg" placeholder="输入消息...">
      <button onclick="sendMsg()" class="bg-primary text-white px-4 py-2 rounded-lg">发送</button>
    </div>
  </div>
</div>

<!-- 个人主页弹窗 -->
<div id="profileModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
  <div class="bg-white rounded-xl w-full max-w-sm p-5">
    <h3 class="text-lg font-bold mb-3">个人主页</h3>
    <div class="space-y-3">
      <img id="profileAvatar" class="w-20 h-20 rounded-full mx-auto">
      <input id="profileSign" class="w-full p-2 border rounded-lg" placeholder="个性签名">
      <div class="flex gap-2 flex-wrap">
        <div id="albumArea" class="flex gap-2 flex-wrap mb-2"></div>
        <button onclick="uploadAlbum()" class="p-2 border rounded-lg"><i class="fa fa-plus"></i></button>
      </div>
      <button onclick="saveProfile()" class="w-full bg-primary text-white p-2 rounded-lg">保存</button>
    </div>
  </div>
</div>

<script>
let ws;
let currentUser = null;
let currentChat = { type: 'private', id: null };
const emojiList = ['😀','😁','😂','🤣','😊','😎','😍','🥳','😜','😝'];

// 页面加载：读取本地记住的账号密码
window.onload = function() {
  const localData = localStorage.getItem('chatUser');
  if (localData) {
    const { account, pwd } = JSON.parse(localData);
    loginAccount.value = account;
    loginPwd.value = pwd;
    rememberPwd.checked = true;
  }
  connectWS();
}

// 连接WebSocket
function connectWS() {
  ws = new WebSocket('ws://localhost:3000');
  ws.onmessage = (e) => {
    const res = JSON.parse(e.data);
    handleWsMessage(res);
  };
}

// 切换登录注册
loginTab.onclick = () => { 
  loginBox.classList.remove('hidden'); 
  regBox.classList.add('hidden'); 
  loginTab.classList.add('border-primary'); 
  regTab.classList.remove('border-primary'); 
}
regTab.onclick = () => { 
  regBox.classList.remove('hidden'); 
  loginBox.classList.add('hidden'); 
  regTab.classList.add('border-primary'); 
  loginTab.classList.remove('border-primary'); 
}

// 注册
function register() {
  const account = regAccount.value, pwd = regPwd.value;
  ws.send(JSON.stringify({ type: 'register', data: { account, pwd } }));
}

// 登录
function login() {
  const account = loginAccount.value, pwd = loginPwd.value;
  ws.send(JSON.stringify({ type: 'login', data: { account, pwd } }));
}

// 处理消息
function handleWsMessage(res) {
  switch(res.type) {
    // 注册成功 → 直接自动登录
    case 'registerRes':
      tip.innerText = res.data.msg;
      if (res.data.code === 1) {
        currentUser = res.data.user;
        // 保存账号密码（如果需要）
        saveRememberPwd(currentUser.account, currentUser.pwd);
        // 直接进入系统
        authModal.classList.add('hidden');
        main.classList.remove('hidden');
        renderUserInfo();
      }
      break;
    // 登录成功
    case 'loginRes':
      if(res.data.code===1){
        currentUser = res.data.user;
        saveRememberPwd(currentUser.account, currentUser.pwd);
        authModal.classList.add('hidden');
        main.classList.remove('hidden');
        renderUserInfo();
      }else tip.innerText = res.data.msg;
      break;
    case 'userData':
      renderList(res.data.friendList, res.data.groupList);
      break;
    case 'newPrivateMsg':
      addMessage(res.data, 'other');
      break;
    case 'newGroupMsg':
      addMessage(res.data, 'other');
      break;
  }
}

// 保存/清除 记住密码
function saveRememberPwd(account, pwd) {
  if (rememberPwd.checked) {
    localStorage.setItem('chatUser', JSON.stringify({ account, pwd }));
  } else {
    localStorage.removeItem('chatUser');
  }
}

// 渲染用户信息
function renderUserInfo() {
  myAvatar.src = currentUser.avatar;
  myName.innerText = currentUser.account;
}

// 渲染列表
function renderList(friends, groups) {
  list.innerHTML = '';
  let showList = friendTab.classList.contains('border-primary') ? friends : groups;
  showList.forEach(item => {
    const div = document.createElement('div');
    div.className = 'p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-2 mb-1';
    div.innerHTML = `
      <img src="${item.avatar||`https://picsum.photos/seed/${item.name||item.account}/100/100`}" class="w-8 h-8 rounded-full">
      <span>${item.name||item.account}</span>
    `;
    div.onclick = () => {
      currentChat.type = friendTab.classList.contains('border-primary') ? 'private' : 'group';
      currentChat.id = item.id;
      chatTitle.innerText = item.name||item.account;
      chatAvatar.src = item.avatar||`https://picsum.photos/seed/${item.name||item.account}/100/100`;
      chatContent.innerHTML = '';
    };
    list.appendChild(div);
  });
}

// 发送消息
function sendMsg() {
  const content = msgInput.value.trim();
  if(!content || !currentChat.id) return;
  const data = currentChat.type==='private' ? {from:currentUser.id,to:currentChat.id,content,msgType:'text'} : {groupId:currentChat.id,from:currentUser.id,content,msgType:'text'};
  ws.send(JSON.stringify({type:currentChat.type==='private'?'privateMsg':'groupMsg',data}));
  addMessage(data, 'self');
  msgInput.value = '';
}

// 添加消息
function addMessage(data, type) {
  const div = document.createElement('div');
  div.className = `flex ${type==='self'?'justify-end':'justify-start'} mb-2`;
  let msgHtml = '';
  switch(data.msgType){
    case 'text': msgHtml = `<div class="px-3 py-2 rounded-lg ${type==='self'?'bg-primary text-white':'bg-gray-200'}">${data.content}</div>`; break;
    case 'image': msgHtml = `<img src="${data.content}" class="max-w-[200px] rounded-lg">`; break;
    case 'file': msgHtml = `<a href="${data.content}" target="_blank" class="px-3 py-2 bg-gray-200 rounded-lg">📎 ${data.content}</a>`; break;
    case 'voice': msgHtml = `<audio controls src="${data.content}" class="h-8"></audio>`; break;
  }
  div.innerHTML = msgHtml;
  chatContent.appendChild(div);
  chatContent.scrollTop = chatContent.scrollHeight;
}

// 个人主页
function openProfile() {
  profileModal.classList.remove('hidden');
  profileAvatar.src = currentUser.avatar;
  profileSign.value = currentUser.sign;
  renderAlbum();
}
function uploadAlbum() {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = () => {
    const file = input.files[0];
    const url = URL.createObjectURL(file);
    currentUser.album.push(url);
    renderAlbum();
  };
  input.click();
}
function renderAlbum() {
  albumArea.innerHTML = currentUser.album.map(url=>`<img src="${url}" class="w-12 h-12 rounded object-cover">`).join('');
}
function saveProfile() {
  currentUser.sign = profileSign.value;
  ws.send(JSON.stringify({type:'updateProfile',data:{uid:currentUser.id,avatar:currentUser.avatar,sign:currentUser.sign,album:currentUser.album}}));
  profileModal.classList.add('hidden');
}

// 发送文件/图片
function sendFile(type) {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = () => {
    const url = URL.createObjectURL(input.files[0]);
    const data = currentChat.type==='private' ? {from:currentUser.id,to:currentChat.id,content:url,msgType:type} : {groupId:currentChat.id,from:currentUser.id,content:url,msgType:type};
    ws.send(JSON.stringify({type:currentChat.type==='private'?'privateMsg':'groupMsg',data}));
    addMessage(data, 'self');
  };
  input.click();
}

// 语音/表情包
function recordVoice() { alert('语音消息开发中'); }
function openEmoji() { msgInput.value += emojiList[Math.floor(Math.random()*emojiList.length)]; }

// 加好友/建群
function openAddFriend() {
  const account = prompt('请输入对方账号：');
  if(account) ws.send(JSON.stringify({type:'addFriend',data:{uid:currentUser.id,friendAccount:account}}));
}
function openCreateGroup() {
  const name = prompt('请输入群聊名称：');
  if(name) ws.send(JSON.stringify({type:'createGroup',data:{uid:currentUser.id,name}}));
}
</script>
</body>
</html>
