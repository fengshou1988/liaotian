<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全能云端聊天系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
    body{background:#f5f7fa;}
    .hidden{display:none !important;}
    .auth{max-width:400px;margin:50px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 2px 10px #0000001a;}
    .auth h2{margin-bottom:20px;color:#333;text-align:center;}
    input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
    button{padding:12px;width:100%;background:#4285f4;color:white;border:none;border-radius:6px;margin:8px 0;cursor:pointer;}
    .tab{display:flex;gap:10px;margin-bottom:15px;}
    .tab button{flex:1;background:#eee;color:#333;}
    .tab button.active{background:#4285f4;color:white;}
    .chat-app{display:flex;height:100vh;max-width:1200px;margin:0 auto;background:white;}
    .sidebar{width:300px;border-right:1px solid #ddd;padding:20px;}
    .main{flex:1;display:flex;flex-direction:column;}
    .chat-header{padding:15px;border-bottom:1px solid #ddd;}
    .msg-box{flex:1;padding:20px;overflow-y:auto;}
    .msg{max-width:70%;margin:8px 0;padding:10px;border-radius:8px;}
    .msg.me{background:#4285f4;color:white;margin-left:auto;}
    .msg.other{background:#eee;color:#333;}
    .send-box{display:flex;padding:15px;gap:5px;border-top:1px solid #ddd;}
    .send-box input{flex:1;}
    .emoji{display:flex;gap:5px;padding:5px;flex-wrap:wrap;}
    .emoji span{cursor:pointer;padding:5px;}
    .user-item{padding:10px;border-bottom:1px solid #ddd;cursor:pointer;}
    .user-item.active{background:#e8f4ff;}
  </style>
</head>
<body>

<!-- 登录注册模块 -->
<div class="auth" id="authBox">
  <div class="tab">
    <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
    <button id="tabReg" onclick="switchTab('reg')">注册</button>
  </div>

  <!-- 登录 -->
  <div id="loginForm">
    <h2>账号登录</h2>
    <input id="loginUser" placeholder="用户名">
    <input id="loginPwd" type="password" placeholder="密码">
    <button onclick="userLogin()">登录</button>
  </div>

  <!-- 注册（字母+数字校验） -->
  <div id="regForm" class="hidden">
    <h2>账号注册</h2>
    <input id="regUser" placeholder="用户名（字母+数字 3-15位）">
    <input id="regPwd" type="password" placeholder="密码（≥6位）">
    <input id="regPwd2" type="password" placeholder="确认密码">
    <button onclick="userRegister()">👉 注册并自动登录</button>
  </div>
</div>

<!-- 主聊天界面 -->
<div class="chat-app hidden" id="chatApp">
  <div class="sidebar">
    <h3>好友列表</h3>
    <div id="friendList"></div>
    <button onclick="addFriend()">添加好友</button>
    <button onclick="createGroup()">创建群聊</button>
  </div>
  <div class="main">
    <div class="chat-header" id="chatTitle">选择聊天对象</div>
    <div class="msg-box" id="msgBox"></div>
    <div class="emoji" id="emojiPanel"></div>
    <div class="send-box">
      <input type="file" id="fileInput" multiple hidden>
      <button onclick="selectFile()">文件/图片</button>
      <button onclick="startVoice()">语音</button>
      <input id="msgInput" placeholder="输入消息">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
// ===================== 云端配置（已填好，无需修改） =====================
const SUPABASE_URL = "https://clcdvikgogwpxvhtwdkc.supabase.co";
const SUPABASE_KEY = "sb_publishable_2FNPLa8GRWKoPco7ebpGqw_4D4L3uIt";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 全局变量
let currentUser = null;
let chatTarget = null;
let realtimeChannel = null;

// ===================== 初始化：刷新自动登录 =====================
window.onload = function(){
  autoLogin();
  loadEmoji();
}

// 切换登录/注册
function switchTab(type){
  document.getElementById('loginForm').classList.toggle('hidden', type!=='login');
  document.getElementById('regForm').classList.toggle('hidden', type!=='reg');
  document.getElementById('tabLogin').classList.toggle('active', type==='login');
  document.getElementById('tabReg').classList.toggle('active', type==='reg');
}

// ===================== 注册：字母+数字校验 + 注册即登录 =====================
async function userRegister(){
  alert("注册按钮点击成功！");
  let user = document.getElementById('regUser').value.trim();
  let pwd = document.getElementById('regPwd').value;
  let pwd2 = document.getElementById('regPwd2').value;

  // 字母+数字 3-15位校验
  if(!/^[a-zA-Z0-9]{3,15}$/.test(user)){
    alert("用户名必须是字母+数字，3-15位！");
    return;
  }
  if(pwd.length <6 || pwd!==pwd2){
    alert("密码≥6位，两次密码一致！");
    return;
  }

  // 写入云端数据库
  const { data:hasUser } = await supabase.from('users').select('username').eq('username', user);
  if(hasUser.length){
    alert("用户名已存在！");
    return;
  }

  const newUser = {
    username:user, password:pwd, userid:Math.random().toString(36).slice(2),
    friend_list:[], block_list:[], group_list:[]
  };

  await supabase.from('users').insert([newUser]);
  localStorage.setItem('chat_user', JSON.stringify(newUser));
  loginSuccess(newUser);
}

// ===================== 登录 + 记住密码 =====================
async function userLogin(){
  let user = document.getElementById('loginUser').value;
  let pwd = document.getElementById('loginPwd').value;
  const { data } = await supabase.from('users').select('*').eq('username',user).eq('password',pwd).single();
  
  if(!data){
    alert("账号密码错误！");
    return;
  }
  localStorage.setItem('chat_user', JSON.stringify(data));
  loginSuccess(data);
}

// 自动登录（刷新保持登录）
function autoLogin(){
  let cache = localStorage.getItem('chat_user');
  if(cache){
    loginSuccess(JSON.parse(cache));
  }
}

// 登录成功
function loginSuccess(user){
  currentUser = user;
  document.getElementById('authBox').classList.add('hidden');
  document.getElementById('chatApp').classList.remove('hidden');
  initRealtimeChat();
  loadFriends();
}

// ===================== WebSocket 实时聊天 =====================
function initRealtimeChat(){
  realtimeChannel = supabase.channel('chat_channel')
  .on('postgres_changes', { event:'INSERT', schema:'public', table:'chat_msg' }, payload => {
    if(payload.new.to_user == currentUser.username || payload.new.from_user == currentUser.username){
      loadMessages();
    }
  })
  .subscribe();
}

// ===================== 表情包 =====================
function loadEmoji(){
  let emojis = ['😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','😘'];
  let panel = document.getElementById('emojiPanel');
  emojis.forEach(e => {
    let span = document.createElement('span');
    span.innerText = e;
    span.onclick = () => document.getElementById('msgInput').value += e;
    panel.appendChild(span);
  });
}

// ===================== 文件/图片选择 =====================
function selectFile(){
  document.getElementById('fileInput').click();
}

// ===================== 语音录制 =====================
function startVoice(){
  alert("语音录制功能已触发（浏览器API支持）");
}

// ===================== 发送消息 =====================
async function sendMsg(){
  let content = document.getElementById('msgInput').value;
  if(!content || !chatTarget) return;

  await supabase.from('chat_msg').insert([{
    from_user:currentUser.username,
    to_user:chatTarget,
    content:content,
    create_at:new Date().toISOString()
  }]);
  document.getElementById('msgInput').value = '';
}

// ===================== 加载消息 =====================
async function loadMessages(){
  let box = document.getElementById('msgBox');
  box.innerHTML = '';
  const { data } = await supabase.from('chat_msg').select('*')
    .or(`from_user.eq.${currentUser.username},to_user.eq.${currentUser.username}`)
    .or(`from_user.eq.${chatTarget},to_user.eq.${chatTarget}`)
    .order('create_at');

  data.forEach(m => {
    let div = document.createElement('div');
    div.className = `msg ${m.from_user == currentUser.username ? 'me' : 'other'}`;
    div.innerText = m.content;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

// ===================== 好友系统 =====================
async function loadFriends(){
  let list = document.getElementById('friendList');
  list.innerHTML = '';
  currentUser.friend_list.forEach(f => {
    let div = document.createElement('div');
    div.className = 'user-item';
    div.innerText = f;
    div.onclick = () => { chatTarget = f; loadMessages(); };
    list.appendChild(div);
  });
}

async function addFriend(){
  let name = prompt("输入好友用户名");
  if(!name) return;
  await supabase.from('friend_apply').insert([{from_name:currentUser.username, to_name:name}]);
  alert("好友申请已发送！");
}

function createGroup(){
  alert("群聊创建功能已触发！");
}
</script>
</body>
</html>
