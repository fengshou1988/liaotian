<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线客服</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, sans-serif;}
    body {max-width: 900px; margin: 10px auto; padding: 0 10px; background: #f5f7fa;}
    .container {display: flex; gap: 10px; height: calc(100vh - 20px); max-height: 700px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; background: #fff;}
    .sidebar {width: 260px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 10px; display: none; flex-direction: column; gap:8px;}
    .sidebar-header {display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; font-weight:500; font-size:16px; color:#1e293b;}
    .badge {background: #ef4444; color: white; font-size: 12px; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center;}
    .conv-list {flex:1; overflow-y: auto;}
    .conv-item {padding: 10px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; background: #fff; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px;}
    .conv-item:hover {border-color: #bfdbfe; background: #f8fafc;}
    .conv-item.active {background: #dbeafe; border-color: #3b82f6;}
    .conv-info {flex:1;}
    .conv-nick {font-weight: 500; margin-bottom: 2px; display: flex; justify-content: space-between;}
    .conv-time {font-size: 11px; color: #94a3b8;}
    .chat-main {flex: 1; display: flex; flex-direction: column; background: #fff; min-width: 0;}
    .header {padding: 12px 15px; background: #2563eb; color: white; font-weight: 500; font-size: 16px;}
    #chat-box {flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; min-height: 0;}
    .msg {margin: 10px 0; display: flex; gap: 8px; max-width: 92%;}
    .msg-avatar {width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; overflow: hidden; background: #e2e8f0; display: flex; align-items: center; justify-content: center;}
    .msg-avatar img {width: 100%; height: 100%; object-fit: cover;}
    .msg-bubble {padding: 9px 13px; border-radius: 12px; max-width: calc(100% - 44px); line-height: 1.5; word-wrap: break-word;}
    .msg small {display: block; font-size: 11px; margin-top: 6px; opacity: 0.8;}
    .msg-img {max-width: 100%; max-height: 220px; border-radius: 8px; cursor: pointer;}
    .my-msg {flex-direction: row-reverse; margin-left: auto;}
    .my-msg .msg-bubble {background: #2563eb; color: white; text-align: right;}
    .other-msg {flex-direction: row; margin-right: auto;}
    .other-msg .msg-bubble {background: #ffffff; border: 1px solid #e2e8f0; color: #1e293b;}
    .input-area {display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px; border-top: 1px solid #eee; background: #fff;}
    input[type="text"] {flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; min-width: 80px;}
    input[type="file"] {display: none;}
    .icon-btn {padding: 10px 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 18px;}
    button {padding: 10px 18px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px;}
    button:hover {background: #1d4ed8;}
    .tip {font-size: 13px; color: #666; margin: 8px 0; text-align: center;}
    .modal {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999;}
    .modal-content {background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 360px;}
    .hidden {display: none !important;}
    #imgZoomModal {position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:1000;}
    #zoomImg {max-width:90%; max-height:90%; border-radius:8px;}
    .conv-avatar {width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center;}
    .conv-avatar img {width: 100%; height: 100%; object-fit: cover;}
  </style>
</head>
<body>
  <div id="registerModal" class="modal hidden">
    <div class="modal-content">
      <h3>请先填写您的信息</h3>
      <input type="text" id="nickname" placeholder="请输入您的昵称" required>
      <input type="text" id="contact" placeholder="联系方式（可选）">
      <button onclick="submitRegister()" style="width:100%;">进入聊天</button>
    </div>
  </div>

  <div id="imgZoomModal" class="hidden" onclick="this.classList.add('hidden')">
    <img id="zoomImg" src="" alt="放大图片">
  </div>

  <div class="container" id="app-container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>对话列表</span>
        <span id="totalUnread" class="badge hidden">0</span>
      </div>
      <div class="conv-list" id="conv-list"></div>
      <div class="pagination" id="pagination">
        <button id="prevPage">上一页</button>
        <span id="pageInfo">第 1 / 1 页</span>
        <button id="nextPage">下一页</button>
      </div>
    </div>

    <div class="chat-main">
      <div class="header" id="page-title">在线客服</div>
      <div id="chat-box"></div>
      <div class="input-area">
        <label for="imgInput" class="icon-btn" title="发送图片">📎</label>
        <input type="file" id="imgInput" accept="image/png,image/jpeg,image/gif,image/webp">
        <div id="previewArea" style="display: flex; align-items: center;"></div>
        <div class="input-row">
          <input type="text" id="msg-input" placeholder="输入消息...按回车可直接发送">
          <button onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tip">
    访客入口：https://fengshou1988.github.io/liaotian/<br>
    管理员入口：https://fengshou1988.github.io/liaotian/?key=MySecurePass2026
  </div>

  <script>
    const ADMIN_KEY = "MySecurePass2026";
    const MAX_IMG_SIZE = 1024 * 1024;
    const PAGE_SIZE = 15;
    const AUTO_CLEAR_DAYS = 90;

    // ✅ 管理员头像设置：这里替换成你自己图片的在线链接即可
    const ADMIN_AVATAR = "https://via.placeholder.com/150/2563eb/ffffff?text=客服";

    // ========== 以下是完整功能代码 ==========
    const firebaseConfig = {
      apiKey: "AIzaSyB5yKzG8m9ZfU7QeXrYf8yKxQeRzT1wU2v3",
      authDomain: "chat-service-12345.firebaseapp.com",
      databaseURL: "https://chat-service-12345-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chat-service-12345",
      storageBucket: "chat-service-12345.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abcdef1234567890abcdef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentChatId = null;
    let isAdmin = false;
    let userInfo = {};
    let allConversations = [];
    let currentPage = 1;

    function checkAdmin() {
      const params = new URLSearchParams(window.location.search);
      return params.get("key") === ADMIN_KEY;
    }

    isAdmin = checkAdmin();
    if (isAdmin) {
      document.getElementById("sidebar").style.display = "flex";
      document.getElementById("page-title").textContent = "客服后台";
      loadConversations();
    } else {
      document.getElementById("registerModal").classList.remove("hidden");
    }

    function submitRegister() {
      const nickname = document.getElementById("nickname").value.trim() || "游客";
      const contact = document.getElementById("contact").value.trim() || "";
      userInfo = { nickname, contact };
      currentChatId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      db.ref(`conversations/${currentChatId}/info`).set({
        ...userInfo,
        createTime: firebase.database.ServerValue.TIMESTAMP,
        unread: 0
      });
      document.getElementById("registerModal").classList.add("hidden");
      listenMessages();
    }

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text && !document.getElementById("previewArea").innerHTML) return;

      const msg = {
        from: isAdmin ? "admin" : "user",
        text: text,
        time: firebase.database.ServerValue.TIMESTAMP,
        read: isAdmin
      };

      if (!isAdmin) {
        db.ref(`conversations/${currentChatId}/info/unread`).transaction(count => (count || 0) + 1);
      }

      db.ref(`conversations/${currentChatId}/messages`).push(msg);
      input.value = "";
      document.getElementById("previewArea").innerHTML = "";
    }

    function listenMessages() {
      db.ref(`conversations/${currentChatId}/messages`).on("value", snap => {
        const box = document.getElementById("chat-box");
        box.innerHTML = "";
        const messages = snap.val() || {};
        Object.values(messages).forEach(m => renderMessage(m));
        box.scrollTop = box.scrollHeight;
      });
    }

    function renderMessage(m) {
      const box = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = m.from === "admin" ? "my-msg msg" : "other-msg msg";
      const avatar = m.from === "admin" ? ADMIN_AVATAR : "https://via.placeholder.com/150/94a3b8/ffffff?text=用";
      const time = new Date(m.time).toLocaleString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      div.innerHTML = `
        <div class="msg-avatar"><img src="${avatar}" alt="头像"></div>
        <div class="msg-bubble">
          ${m.text || ""}
          <small>${time}</small>
        </div>
      `;
      box.appendChild(div);
    }

    function loadConversations() {
      db.ref("conversations").orderByChild("info/createTime").limitToLast(50).on("value", snap => {
        allConversations = [];
        snap.forEach(child => {
          const id = child.key;
          const info = child.val().info || {};
          allConversations.unshift({ id, ...info });
        });
        renderConversations();
      });
    }

    function renderConversations() {
      const list = document.getElementById("conv-list");
      list.innerHTML = "";
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageData = allConversations.slice(start, start + PAGE_SIZE);
      pageData.forEach(conv => {
        const item = document.createElement("div");
        item.className = "conv-item";
        item.innerHTML = `
          <div class="conv-avatar"><img src="https://via.placeholder.com/150/94a3b8/ffffff?text=${conv.nickname?.charAt(0) || "游"}" alt="头像"></div>
          <div class="conv-info">
            <div class="conv-nick">${conv.nickname || "游客"} ${conv.unread ? `<span class="badge">${conv.unread}</span>` : ""}</div>
            <div class="conv-time">${new Date(conv.createTime).toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })}</div>
          </div>
        `;
        item.onclick = () => {
          currentChatId = conv.id;
          document.querySelectorAll(".conv-item").forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          db.ref(`conversations/${conv.id}/info/unread`).set(0);
          listenMessages();
        };
        list.appendChild(item);
      });
    }

    document.getElementById("msg-input").addEventListener("keydown", e => e.key === "Enter" && sendMessage());
  </script>
</body>
</html>
