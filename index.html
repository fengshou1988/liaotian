<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友内部聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f2f3f5; max-width: 720px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 14px; text-align: center; font-weight: bold; font-size: 17px; border-bottom: 1px solid #eee; }
        .login-wrap { padding: 20px; background: #fff; margin: 10px; border-radius: 10px; }
        .login-wrap input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd;
            border-radius: 20px; outline: none; font-size: 15px;
        }
        .login-wrap button {
            width: 100%; padding: 12px; background: #07c160; color: #fff;
            border: none; border-radius: 20px; font-size: 16px; cursor: pointer;
        }
        .chat-box { flex: 1; padding: 10px; overflow-y: auto; }
        .msg { margin: 12px 0; max-width: 72%; }
        .msg-other { margin-right: auto; }
        .msg-self { margin-left: auto; text-align: right; }
        .msg-name { font-size: 12px; color: #999; margin-bottom: 3px; padding: 0 8px; }
        .msg-content { padding: 9px 14px; border-radius: 14px; word-break: break-all; }
        .msg-other .msg-content { background: #ffffff; }
        .msg-self .msg-content { background: #95ec69; }
        .input-wrap {
            display: flex; gap: 8px; padding: 10px; background: #fff; border-top: 1px solid #eee;
        }
        #nick { width: 90px; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #msgInput { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #sendBtn { padding: 10px 18px; background: #07c160; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
        .hide { display: none !important; }
        .tip { text-align: center; color: #888; font-size: 13px; padding: 5px; }
    </style>
</head>
<body>
    <div class="header">内部私密聊天</div>

    <!-- 登录面板（密码+昵称） -->
    <div class="login-wrap" id="loginPanel">
        <input type="text" id="userNick" placeholder="输入你的昵称">
        <input type="password" id="userPwd" placeholder="输入聊天密码">
        <button onclick="login()">进入聊天</button>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-box hide" id="chatPanel"></div>
    <div class="tip hide" id="loadTip">消息同步中...</div>

    <!-- 输入区域 -->
    <div class="input-wrap hide" id="inputPanel">
        <input type="text" id="nick" placeholder="昵称" readonly>
        <input type="text" id="msgInput" placeholder="输入消息，回车发送">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

<script>
// ===================== 【这里必须改成你自己的信息！】=====================
const GITHUB_USER = "你的GitHub用户名";
const GITHUB_REPO = "你的仓库名称";
const GITHUB_TOKEN = "你的PAT令牌";
const CHAT_PASSWORD = "123456"; // 自定义内部聊天密码，只告诉好友
// ======================================================================

const FILE_PATH = "chat.json";
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
let currentNick = "";
let fileSha = "";       // GitHub 文件标识，更新文件必须用到
let msgList = [];      // 本地消息列表

// 页面加载后自动拉取消息
window.onload = function(){
    setInterval(fetchMsg, 2500); // 每2.5秒自动同步一次消息，延迟低、不超限
}

// 登录验证
function login(){
    let nick = document.getElementById("userNick").value.trim();
    let pwd = document.getElementById("userPwd").value.trim();
    if(!nick){
        alert("请输入昵称！");
        return;
    }
    if(pwd !== CHAT_PASSWORD){
        alert("密码错误，无法进入！");
        return;
    }
    currentNick = nick;
    // 切换界面
    document.getElementById("loginPanel").classList.add("hide");
    document.getElementById("chatPanel").classList.remove("hide");
    document.getElementById("loadTip").classList.remove("hide");
    document.getElementById("inputPanel").classList.remove("hide");
    document.getElementById("nick").value = nick;
    // 首次加载消息
    fetchMsg();
}

// 从 GitHub 拉取最新消息
async function fetchMsg(){
    try{
        const res = await fetch(API_URL, {
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Accept": "application/vnd.github.v3+json"
            }
        });
        const data = await res.json();
        fileSha = data.sha;
        // Base64 解码内容
        const content = decodeURIComponent(escape(atob(data.content)));
        msgList = JSON.parse(content);
        renderMsg();
        document.getElementById("loadTip").innerText = "消息已同步";
    }catch(e){
        document.getElementById("loadTip").innerText = "同步失败，请检查网络";
        console.error(e);
    }
}

// 渲染聊天界面
function renderMsg(){
    const box = document.getElementById("chatPanel");
    box.innerHTML = "";
    msgList.forEach(item => {
        let cls = item.nick === currentNick ? "msg-self" : "msg-other";
        box.innerHTML += `
            <div class="msg ${cls}">
                <div class="msg-name">${item.nick} ${item.time}</div>
                <div class="msg-content">${item.content}</div>
            </div>
        `;
    });
    // 滚动到底部
    box.scrollTop = box.scrollHeight;
}

// 发送消息（上传到 GitHub 文件）
async function sendMessage(){
    let input = document.getElementById("msgInput");
    let content = input.value.trim();
    if(!content) return;

    // 组装新消息
    let now = new Date();
    let timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
    let newMsg = {
        nick: currentNick,
        content: content,
        time: timeStr
    };
    msgList.push(newMsg);

    try{
        // 编码内容
        let updateContent = btoa(unescape(encodeURIComponent(JSON.stringify(msgList))));
        // 提交更新到 GitHub 文件
        await fetch(API_URL, {
            method: "PUT",
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Accept": "application/vnd.github.v3+json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "更新聊天消息",
                content: updateContent,
                sha: fileSha
            })
        });
        input.value = "";
        fetchMsg(); // 立即刷新
    }catch(e){
        alert("发送失败，请稍后再试");
        console.error(e);
    }
}

// 回车快捷发送
document.getElementById("msgInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
