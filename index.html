<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云端聊天系统（最终完整版）</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
body{background:#f5f5f5}
.hidden{display:none !important}
.btn{padding:7px 14px;border:none;border-radius:4px;background:#4285f4;color:#fff;cursor:pointer}
.btn-green{background:#34a853}
.btn-yellow{background:#fbbc05}
.btn-red{background:#ea4335}
.auth-box{width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:8px}
.auth-tab{display:flex;margin-bottom:20px}
.auth-tab>div{flex:1;text-align:center;padding:10px;background:#eee;cursor:pointer}
.auth-tab>div.active{background:#4285f4;color:#fff}
.form-item{margin-bottom:14px}
.form-item input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}
.err{color:#f03838;font-size:12px;margin:4px 0}
.main-box{max-width:1200px;margin:0 auto;height:100vh;display:flex;background:#fff}
.sidebar{width:260px;border-right:1px solid #eee;display:flex;flex-direction:column}
.myinfo{padding:16px;display:flex;gap:12px;align-items:center}
.avatar{width:46px;height:46px;border-radius:50%}
.id-text{font-size:12px;color:#0066ff;cursor:pointer}
.menu-bar{padding:10px;gap:8px;display:flex}
.contact-list{flex:1;overflow:auto}
.contact-item{padding:11px 14px;border-bottom:1px solid #f4f4f4;cursor:pointer;display:flex;gap:10px;align-items:center}
.chat-wrap{flex:1;display:flex;flex-direction:column}
.chat-head{padding:14px;border-bottom:1px solid #eee}
.msg-container{flex:1;padding:15px;overflow:auto;background:#f7f8fa}
.msg-item{margin:12px 0;max-width:78%}
.msg-self{margin-left:auto;text-align:right}
.msg-content{padding:9px 13px;border-radius:16px;background:#fff}
.msg-self .msg-content{background:#4285f4;color:#fff}
.read-tag{font-size:11px;color:#888}
.recall-btn{font-size:11px;color:#999;cursor:pointer;margin-top:3px}
.recall-text{color:#999;font-style:italic}
.input-area{padding:12px;display:flex;gap:10px}
.msg-input{flex:1;height:46px;padding:10px;border:1px solid #ddd;border-radius:22px;outline:none}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#00000050;display:flex;align-items:center;justify-content:center}
.modal-inner{background:#fff;padding:22px;border-radius:8px;width:380px}
.badge{background:#f03838;color:#fff;font-size:11px;padding:1px 5px;border-radius:10px}
</style>
</head>
<body>

<!-- 登录注册 -->
<div id="authBox" class="auth-box">
    <div class="auth-tab">
        <div id="tabLogin" class="active" onclick="switchTab('login')">登录</div>
        <div id="tabReg" onclick="switchTab('reg')">注册</div>
    </div>
    <div id="loginBox">
        <div class="form-item"><input id="loginUser" placeholder="用户名"></div>
        <div class="form-item"><input id="loginPwd" type="password" placeholder="密码"></div>
        <div class="err" id="loginErr"></div>
        <button class="btn btn-green" id="loginBtn">登录</button>
    </div>
    <div id="regBox" class="hidden">
        <div class="form-item"><input id="regUser" placeholder="用户名(字母+数字3-15位)"></div>
        <div class="form-item"><input id="regPwd" type="password" placeholder="密码≥6位"></div>
        <div class="form-item"><input id="regPwd2" type="password" placeholder="确认密码"></div>
        <div class="err" id="regErr"></div>
        <button class="btn btn-yellow" id="regBtn">注册并登录</button>
    </div>
</div>

<!-- 主界面 -->
<div id="mainBox" class="main-box hidden">
    <div class="sidebar">
        <div class="myinfo">
            <img id="myAvt" class="avatar">
            <div>
                <div id="myName"></div>
                <div id="myID" class="id-text" onclick="copyID()">点击复制ID</div>
            </div>
        </div>
        <div class="menu-bar">
            <button class="btn" onclick="loadFriends()">好友</button>
            <button class="btn" onclick="openApply()">申请<span id="badge" class="badge hidden"></span></button>
            <button class="btn btn-yellow" onclick="openAdd()">加好友</button>
        </div>
        <div id="friendList" class="contact-list"></div>
    </div>
    <div class="chat-wrap">
        <div class="chat-head" id="chatTitle">选择好友聊天</div>
        <div id="msgWrap" class="msg-container"></div>
        <div class="input-area">
            <input class="msg-input" id="msgInput" placeholder="输入消息">
            <button class="btn" onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div id="addModal" class="modal hidden"><div class="modal-inner"><input id="searchKey" placeholder="输入ID/用户名"><div class="err" id="addErr"></div><button class="btn btn-green" onclick="sendApply()">发送申请</button><button class="btn btn-red" onclick="closeModal()">关闭</button></div></div>
<div id="applyModal" class="modal hidden"><div class="modal-inner"><div id="applyList"></div><button class="btn btn-red" onclick="closeModal()">关闭</button></div></div>

<script>
// ============ 你的固定云端参数，无需修改 ============
const SUPABASE_URL = "https://clcdvikgogwpxvhtwdkc.supabase.co";
const SUPABASE_KEY = "sb_publishable_2FNPLa8GRWKoPco7ebpGqw_4D4L3uIt";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let chatUser = null;

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('regBtn').onclick = userRegister;
    document.getElementById('loginBtn').onclick = userLogin;
    autoLogin();
});

function createUID() {
    return Math.random().toString(36).slice(2,10).toUpperCase();
}

function switchTab(type) {
    if(type === 'login'){
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('regBox').classList.add('hidden');
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabReg').classList.remove('active');
    }else{
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('regBox').classList.remove('hidden');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('tabReg').classList.add('active');
    }
}

//注册
async function userRegister() {
    const user = document.getElementById('regUser').value.trim();
    const pwd = document.getElementById('regPwd').value;
    const pwd2 = document.getElementById('regPwd2').value;
    const err = document.getElementById('regErr');
    err.innerText = '';
    if(!/^[a-zA-Z0-9]{3,15}$/.test(user)) return err.innerText = "用户名：字母+数字3-15位";
    if(pwd.length < 6) return err.innerText = "密码至少6位";
    if(pwd !== pwd2) return err.innerText = "两次密码不一致";
    const { data: hasUser } = await supabase.from('users').select('username').eq('username', user);
    if(hasUser.length) return err.innerText = "用户名已存在";
    const newUser = {username: user,password: pwd,userid: createUID(),avatar:"https://picsum.photos/id/"+Math.floor(Math.random()*99),friend_list: []};
    await supabase.from('users').insert([newUser]);
    localStorage.setItem('chat_login', JSON.stringify({user,pwd}));
    loginSuccess(newUser);
}

//登录
async function userLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pwd = document.getElementById('loginPwd').value;
    const err = document.getElementById('loginErr');
    const { data } = await supabase.from('users').select('*').eq('username',user).eq('password',pwd);
    if(!data.length) return err.innerText = "账号或密码错误";
    localStorage.setItem('chat_login', JSON.stringify({user,pwd}));
    loginSuccess(data[0]);
}

//刷新自动登录
async function autoLogin() {
    const cache = localStorage.getItem('chat_login');
    if(!cache) return;
    const {user,pwd} = JSON.parse(cache);
    const { data } = await supabase.from('users').select('*').eq('username',user).eq('password',pwd);
    if(data.length) loginSuccess(data[0]);
}

function loginSuccess(user) {
    currentUser = user;
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('mainBox').classList.remove('hidden');
    document.getElementById('myName').innerText = user.username;
    document.getElementById('myID').innerText = "ID："+user.userid;
    document.getElementById('myAvt').src = user.avatar;
    loadFriends();
    refreshBadge();
}

function copyID() {
    navigator.clipboard.writeText(currentUser.userid).then(()=>alert('复制ID成功'));
}

//好友
async function loadFriends() {
    const list = document.getElementById('friendList');
    list.innerHTML = '';
    const friends = currentUser.friend_list || [];
    for(let name of friends) {
        const { data } = await supabase.from('users').select('*').eq('username',name);
        const u = data[0];
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.innerHTML = `<img src="${u.avatar}" class="avatar"><div>${name}<br>ID:${u.userid}</div>`;
        div.onclick = () => openChat(name);
        list.appendChild(div);
    }
}

async function openChat(name) {
    chatUser = name;
    document.getElementById('chatTitle').innerText = "与 "+name+" 聊天";
    const wrap = document.getElementById('msgWrap');
    wrap.innerHTML = '';
    const { data: msgs } = await supabase.from('chat_msg')
        .or(`from_user.eq.${currentUser.username},to_user.eq.${currentUser.username}`)
        .or(`from_user.eq.${name},to_user.eq.${name}`).order('create_at');
    msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg-item ' + (m.from_user === currentUser.username ? 'msg-self' : '');
        div.innerHTML = m.is_recall ? '<i class="recall-text">消息已撤回</i>' : 
            `<div class="msg-content">${m.content}</div>${m.from_user===currentUser.username ? `<span class="read-tag">${m.is_read?'已读':'未读'}</span><div class="recall-btn" onclick="recallMsg(${m.id})">撤回</div>` : ''}`;
        wrap.appendChild(div);
    });
    wrap.scrollTop = wrap.scrollHeight;
    await supabase.from('chat_msg').update({is_read:true}).eq('to_user',currentUser.username).eq('from_user',name);
}

async function sendMsg() {
    const val = document.getElementById('msgInput').value.trim();
    if(!val || !chatUser) return;
    await supabase.from('chat_msg').insert([{from_user:currentUser.username, to_user:chatUser, content:val, is_read:false, is_recall:false}]);
    document.getElementById('msgInput').value = '';
    openChat(chatUser);
}

async function recallMsg(id) {
    await supabase.from('chat_msg').update({is_recall:true}).eq('id',id);
    openChat(chatUser);
}

//申请弹窗
function openAdd() { closeModal(); document.getElementById('addModal').classList.remove('hidden'); }
function openApply() { closeModal(); document.getElementById('applyModal').classList.remove('hidden'); renderApply(); }
function closeModal() { document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden')); }

async function sendApply() {
    const key = document.getElementById('searchKey').value.trim();
    const { data } = await supabase.from('users').select('*').or(`username.eq.${key},userid.eq.${key}`);
    if(!data.length) return document.getElementById('addErr').innerText = "用户不存在";
    await supabase.from('friend_apply').insert([{from_name:currentUser.username,to_name:data[0].username}]);
    alert("申请发送成功"); closeModal();
}

async function renderApply() {
    const { data } = await supabase.from('friend_apply').select('*').eq('to_name',currentUser.username);
    const list = document.getElementById('applyList');
    list.innerHTML = '';
    data.forEach(item => {
        list.innerHTML += `<div style="padding:8px;border-bottom:1px solid #eee">${item.from_name}发来好友申请<br>
        <button class="btn btn-green" onclick="agree(${item.id},'${item.from_name}')">同意</button>
        <button class="btn btn-red" onclick="refuse(${item.id})">拒绝</button></div>`;
    });
}

async function agree(id,name) {
    let newArr = [...currentUser.friend_list,name];
    await supabase.from('users').update({friend_list:newArr}).eq('username',currentUser.username);
    await supabase.from('friend_apply').delete().eq('id',id);
    currentUser.friend_list = newArr;
    loadFriends(); openApply();
}

async function refuse(id) {
    await supabase.from('friend_apply').delete().eq('id',id);
    openApply();
}

async function refreshBadge() {
    const {count} = await supabase.from('friend_apply').select('*',{count:'exact'}).eq('to_name',currentUser.username);
    const badge = document.getElementById('badge');
    count>0 ? (badge.classList.remove('hidden'),badge.innerText=count) : badge.classList.add('hidden');
}
</script>
</body>
</html>
