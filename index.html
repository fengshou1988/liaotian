<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>云端互通聊天系统-Supabase版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
body{background:#f5f5f5}
.hidden{display:none !important}
.btn{padding:7px 14px;border:none;border-radius:4px;background:#4285f4;color:#fff;cursor:pointer}
.btn-green{background:#34a853}
.btn-yellow{background:#fbbc05}
.btn-red{background:#ea4335}
.auth-box{width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 12px #0000001a}
.auth-tab{display:flex;margin-bottom:20px}
.auth-tab>div{flex:1;text-align:center;padding:10px;background:#eee;cursor:pointer}
.auth-tab>div.active{background:#4285f4;color:#fff}
.form-item{margin-bottom:14px}
.form-item input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}
.err{color:#f03838;font-size:13px;margin:4px 0}
.main-box{max-width:1200px;margin:0 auto;height:calc(100vh - 30px);display:flex;background:#fff;border-radius:8px;overflow:hidden}
.sidebar{width:260px;border-right:1px solid #eee;display:flex;flex-direction:column}
.myinfo{padding:16px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center}
.avatar{width:46px;height:46px;border-radius:50%}
.id-text{font-size:12px;color:#0066ff;cursor:pointer;margin:4px 0}
.menu-bar{display:flex;padding:10px;gap:8px;border-bottom:1px solid #eee}
.contact-list{flex:1;overflow:auto}
.contact-item{padding:11px 14px;border-bottom:1px solid #f4f4f4;cursor:pointer;display:flex;gap:10px;align-items:center}
.chat-wrap{flex:1;display:flex;flex-direction:column}
.chat-head{padding:14px;border-bottom:1px solid #eee}
.msg-container{flex:1;padding:15px;overflow:auto;background:#f7f8fa}
.msg-item{margin:12px 0;max-width:78%;position:relative}
.msg-self{margin-left:auto;text-align:right}
.msg-content{padding:9px 13px;border-radius:16px;background:#fff;box-shadow:0 1px 3px #00000012}
.msg-self .msg-content{background:#4285f4;color:#fff}
.read-tag{font-size:11px;color:#888;margin-left:6px}
.recall-btn{font-size:11px;color:#999;cursor:pointer;margin-top:3px}
.recall-text{color:#999;font-style:italic}
.input-area{padding:12px;border-top:1px solid #eee;display:flex;gap:10px;align-items:center}
.msg-input{flex:1;height:46px;padding:10px;border:1px solid #ddd;border-radius:22px;outline:none}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#00000050;display:flex;align-items:center;justify-content:center;z-index:999}
.modal-inner{background:#fff;padding:22px;border-radius:8px;width:380px}
.badge{background:#f03838;color:#fff;font-size:11px;padding:1px 5px;border-radius:10px;margin-left:5px}
</style>
</head>
<body>
<!--登录注册-->
<div id="authBox" class="auth-box">
    <div class="auth-tab">
        <div id="tabLogin" class="active" onclick="switchTab('login')">登录</div>
        <div id="tabReg" onclick="switchTab('reg')">注册</div>
    </div>
    <div id="loginBox">
        <div class="form-item">
            <input id="loginUser" placeholder="用户名">
        </div>
        <div class="form-item">
            <input id="loginPwd" type="password" placeholder="密码">
        </div>
        <div class="form-item">
            <label><input type="checkbox" id="remPwd" checked>记住密码</label>
        </div>
        <div class="err" id="loginErr"></div>
        <button class="btn btn-green" onclick="userLogin()">登录</button>
    </div>
    <div id="regBox" class="hidden">
        <div class="form-item">
            <input id="regUser" placeholder="用户名(字母+数字 3~15位)">
        </div>
        <div class="form-item">
            <input id="regPwd" type="password" placeholder="密码≥6位">
        </div>
        <div class="form-item">
            <input id="regPwd2" type="password" placeholder="确认密码">
        </div>
        <div class="err" id="regErr"></div>
        <button class="btn btn-yellow" onclick="userRegister()">注册并登录</button>
    </div>
</div>

<!--主界面-->
<div id="mainBox" class="main-box hidden">
    <div class="sidebar">
        <div class="myinfo">
            <img id="myAvt" class="avatar">
            <div>
                <div id="myName"></div>
                <div id="myID" class="id-text" onclick="copySelfID()">点击复制ID</div>
                <div style="font-size:12px;color:#28b944">在线</div>
            </div>
            <button class="btn" onclick="alert('个人主页后续扩展')">主页</button>
        </div>
        <div class="menu-bar">
            <button class="btn" onclick="loadFriend()">好友</button>
            <button class="btn" onclick="openApplyBox()">申请<span id="applyBadge" class="badge hidden">0</span></button>
            <button class="btn btn-yellow" onclick="openAddFriendBox()">加好友</button>
        </div>
        <div id="friendList" class="contact-list"></div>
    </div>
    <div class="chat-wrap">
        <div class="chat-head" id="chatTitle">选择好友开始聊天</div>
        <div id="msgWrap" class="msg-container"></div>
        <div class="input-area">
            <input class="msg-input" id="sendInput" placeholder="输入消息...">
            <button class="btn" onclick="sendTextMsg()">发送</button>
        </div>
    </div>
</div>

<!--加好友弹窗-->
<div id="addFriendModal" class="modal hidden">
    <div class="modal-inner">
        <h3>通过ID/用户名添加好友</h3>
        <div class="form-item" style="margin:15px 0">
            <input id="searchKey" placeholder="填写对方ID或用户名">
        </div>
        <div class="err" id="addErr"></div>
        <div style="display:flex;gap:10px">
            <button class="btn btn-green" onclick="sendFriendApply()">发送申请</button>
            <button class="btn btn-red" onclick="closeAllModal()">关闭</button>
        </div>
    </div>
</div>

<!--好友申请弹窗-->
<div id="applyModal" class="modal hidden">
    <div class="modal-inner">
        <h3>收到的好友申请</h3>
        <div id="applyList" style="margin:15px 0;max-height:250px;overflow:auto;"></div>
        <button class="btn btn-red" onclick="closeAllModal()">关闭</button>
    </div>
</div>

<script>
//=====填入你自己的Supabase参数=====
const SUPABASE_URL = "https://clcdvikgogwpxvhtwdkc.supabase.co";
const SUPABASE_KEY = "sb_publishable_2FNPLa8GRWKoPco7ebpGqw_4D4L3uIt";
const { createClient } = supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let nowChatUser = null;

//生成8位大写ID
function createUID(){
    return Math.random().toString(36).slice(2,10).toUpperCase();
}

//切换登录注册标签
function switchTab(type){
    if(type==='login'){
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('regBox').classList.add('hidden');
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabReg').classList.remove('active');
    }else{
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('regBox').classList.remove('hidden');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('tabReg').classList.add('active');
    }
}

//注册（写入云端users表）
async function userRegister(){
    const name = document.getElementById('regUser').value.trim();
    const pwd = document.getElementById('regPwd').value;
    const pwd2 = document.getElementById('regPwd2').value;
    const errDom = document.getElementById('regErr');
    const reg = /^[a-zA-Z0-9]{3,15}$/;
    if(!reg.test(name)){errDom.innerText = "用户名仅允许字母+数字，长度3~15";return;}
    if(pwd.length<6){errDom.innerText = "密码最少6位";return;}
    if(pwd!==pwd2){errDom.innerText = "两次密码不一致";return;}

    //查重用户名
    const {data:userExist} = await supabase.from('users').select('username').eq('username',name);
    if(userExist.length>0){errDom.innerText="用户名已被注册";return;}

    const newUid = createUID();
    const newUser = {
        username:name,
        password:pwd,
        userid:newUid,
        avatar:"https://picsum.photos/id/"+Math.floor(Math.random()*99),
        signature:"暂无签名",
        friend_list:[],
        block_list:[]
    }
    await supabase.from('users').insert([newUser]);
    loginSuccess(newUser);
}

//登录（读取云端）
async function userLogin(){
    const name = document.getElementById('loginUser').value.trim();
    const pwd = document.getElementById('loginPwd').value;
    const errDom = document.getElementById('loginErr');
    const {data:userData} = await supabase.from('users').select('*').eq('username',name).eq('password',pwd);
    if(userData.length===0){errDom.innerText="账号密码错误";return;}
    const user = userData[0];
    if(document.getElementById('remPwd').checked){
        localStorage.setItem("chatRemember",JSON.stringify({user:name,pwd:pwd}));
    }else{
        localStorage.removeItem("chatRemember");
    }
    loginSuccess(user);
}

//登录成功渲染页面
function loginSuccess(user){
    currentUser = user;
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('mainBox').classList.remove('hidden');
    document.getElementById('myName').innerText = user.username;
    document.getElementById('myID').innerText = "ID："+user.userid+"（点击复制）";
    document.getElementById('myAvt').src = user.avatar;
    loadFriend();
    refreshApplyBadge();
}

//页面初始化自动登录
window.onload = async function(){
    let rem = localStorage.getItem("chatRemember");
    if(rem){
        const info = JSON.parse(rem);
        const {data:uData}=await supabase.from('users').select('*').eq('username',info.user).eq('password',info.pwd);
        if(uData.length>0) loginSuccess(uData[0]);
    }
}

//复制自身ID
function copySelfID(){
    navigator.clipboard.writeText(currentUser.userid).then(()=>alert("ID复制成功！"));
}

//加载好友列表
async function loadFriend(){
    const wrap = document.getElementById('friendList');
    wrap.innerHTML = "";
    const friendArr = currentUser.friend_list||[];
    for(let fname of friendArr){
        const {data:fData}=await supabase.from('users').select('username,userid,avatar').eq('username',fname);
        const fUser = fData[0];
        const div = document.createElement('div');
        div.className = "contact-item";
        div.innerHTML = `<img class="avatar" src="${fUser.avatar}"><div>${fUser.username}<br><span style="font-size:11px;color:#666">ID:${fUser.userid}</span></div>`;
        div.onclick = ()=>openChat(fname);
        wrap.appendChild(div);
    }
}

//打开聊天，加载云端消息
async function openChat(fName){
    nowChatUser = fName;
    document.getElementById('chatTitle').innerText = "正在和"+fName+"聊天";
    const wrap = document.getElementById('msgWrap');
    wrap.innerHTML = "";
    //查询双向聊天记录
    const {data:msgList}=await supabase.from('chat_msg').select('*').or(`from_user.eq.${currentUser.username},to_user.eq.${currentUser.username}`).or(`from_user.eq.${fName},to_user.eq.${fName}`).order('create_at');
    msgList.forEach(item=>renderMsg(item));
    wrap.scrollTop = wrap.scrollHeight;
    markMsgRead(fName);
}

//渲染单条消息
function renderMsg(msg){
    const wrap = document.getElementById('msgWrap');
    const div = document.createElement('div');
    div.className = "msg-item "+(msg.from_user===currentUser.username?"msg-self":"");
    if(msg.is_recall){
        div.innerHTML = `<div class="recall-text">消息已撤回</div>`;
    }else{
        let html = `<div class="msg-content">${msg.content}</div>`;
        if(msg.from_user===currentUser.username){
            html += `<span class="read-tag">${msg.is_read?"已读":"未读"}</span>`;
            html += `<div class="recall-btn" onclick="recallMsg(${msg.id})">撤回</div>`;
        }
        div.innerHTML = html;
    }
    wrap.appendChild(div);
}

//发送消息存入云端
async function sendTextMsg(){
    const input = document.getElementById('sendInput');
    const val = input.value.trim();
    if(!val||!nowChatUser) return;
    const saveMsg = {
        from_user:currentUser.username,
        to_user:nowChatUser,
        content:val,
        is_read:false,
        is_recall:false
    }
    await supabase.from('chat_msg').insert([saveMsg]);
    const {data:newMsg}=await supabase.from('chat_msg').select('*').order('id',{asc:false}).limit(1);
    renderMsg(newMsg[0]);
    input.value = "";
    document.getElementById('msgWrap').scrollTop = document.getElementById('msgWrap').scrollHeight;
}

//撤回消息（云端修改标记）
async function recallMsg(mid){
    await supabase.from('chat_msg').update({is_recall:true}).eq('id',mid);
    openChat(nowChatUser);
}

//打开加好友弹窗
function openAddFriendBox(){
    closeAllModal();
    document.getElementById('addFriendModal').classList.remove('hidden');
    document.getElementById('searchKey').value = "";
    document.getElementById('addErr').innerText = "";
}
function openApplyBox(){
    closeAllModal();
    document.getElementById('applyModal').classList.remove('hidden');
    renderApplyList();
}
function closeAllModal(){
    document.getElementById('addFriendModal').classList.add('hidden');
    document.getElementById('applyModal').classList.add('hidden');
}

//发送好友申请存入申请表
async function sendFriendApply(){
    const key = document.getElementById('searchKey').value.trim();
    const errDom = document.getElementById('addErr');
    if(!key){errDom.innerText="请输入ID或用户名";return;}
    const {data:targetUser}=await supabase.from('users').select('username,userid').or(`username.eq.${key},userid.eq.${key}`);
    if(targetUser.length===0){errDom.innerText="未找到该用户";return;}
    const tar = targetUser[0];
    if(tar.username===currentUser.username){errDom.innerText="不能添加自己";return;}
    //查重申请
    const {data:applyExist}=await supabase.from('friend_apply').select('*').eq('from_name',currentUser.username).eq('to_name',tar.username);
    if(applyExist.length>0){errDom.innerText="已经发送过申请";return;}
    await supabase.from('friend_apply').insert([{from_name:currentUser.username,from_uid:currentUser.userid,to_name:tar.username}]);
    alert("好友申请发送成功！等待对方同意");
    closeAllModal();
}

//渲染收到的申请
async function renderApplyList(){
    const wrap = document.getElementById('applyList');
    wrap.innerHTML = "";
    const {data:applyList}=await supabase.from('friend_apply').select('*').eq('to_name',currentUser.username);
    if(applyList.length===0){wrap.innerText="暂无好友申请";return;}
    applyList.forEach(item=>{
        const div = document.createElement('div');
        div.style.padding = "8px 0";
        div.style.borderBottom = "1px solid #eee";
        div.innerHTML = `【${item.from_name}】发起好友申请
        <div style="margin-top:6px;gap:8px;display:flex">
            <button class="btn btn-green" onclick="agreeApply('${item.from_name}',${item.id})">同意</button>
            <button class="btn btn-red" onclick="refuseApply(${item.id})">拒绝</button>
        </div>`;
        wrap.appendChild(div);
    })
}

//同意好友：双向更新好友列表+删除申请
async function agreeApply(fromName,applyId){
    //我方加好友
    let newMyFriend = [...currentUser.friend_list||[],fromName];
    await supabase.from('users').update({friend_list:newMyFriend}).eq('username',currentUser.username);
    //对方加好友
    const {data:fromUser}=await supabase.from('users').select('friend_list').eq('username',fromName);
    let newFrFriend = [...fromUser[0].friend_list||[],currentUser.username];
    await supabase.from('users').update({friend_list:newFrFriend}).eq('username',fromName);
    //删除申请
    await supabase.from('friend_apply').delete().eq('id',applyId);
    currentUser.friend_list = newMyFriend;
    loadFriend();
    refreshApplyBadge();
    renderApplyList();
    alert("已添加为好友");
}

//拒绝：只删申请
async function refuseApply(applyId){
    await supabase.from('friend_apply').delete().eq('id',applyId);
    refreshApplyBadge();
    renderApplyList();
}

//刷新申请红点角标
async function refreshApplyBadge(){
    const {data:applyNum}=await supabase.from('friend_apply').select('id',{count:'exact'}).eq('to_name',currentUser.username);
    const badge = document.getElementById('applyBadge');
    if(applyNum.count>0){
        badge.classList.remove('hidden');
        badge.innerText = applyNum.count;
    }else{
        badge.classList.add('hidden');
    }
}

//打开聊天自动标记已读
async function markMsgRead(toName){
    await supabase.from('chat_msg').update({is_read:true}).eq('to_user',currentUser.username).eq('from_user',toName).eq('is_read',false);
    openChat(toName);
}
</script>
</body>
</html>
