<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>极简聊天系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{padding:30px;background:#f5f5f5;font-family:微软雅黑;}
    .box{max-width:300px;background:white;padding:20px;border-radius:8px;}
    input{width:100%;margin:8px 0;padding:10px;}
    button{width:100%;padding:10px;background:#4285f4;color:white;border:none;border-radius:4px;margin:5px 0;cursor:pointer;}
  </style>
</head>
<body>
  <div class="box">
    <h3>注册</h3>
    <input id="user" placeholder="用户名（3-15位）">
    <input id="pwd" type="password" placeholder="密码（≥6位）">
    <input id="pwd2" type="password" placeholder="确认密码">
    <button onclick="register()">👉 点我注册（必响应）</button>

    <h3>登录</h3>
    <input id="login_user" placeholder="用户名">
    <input id="login_pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
  </div>

  <script>
    // 你的云端配置（已填好，不用改）
    const SUPABASE_URL = "https://clcdvikgogwpxvhtwdkc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_2FNPLa8GRWKoPco7ebpGqw_4D4L3uIt";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 注册函数（极简版，点击绝对有反应）
    async function register() {
      alert("注册按钮点击成功！开始执行..."); // 点击就弹提示，证明按钮生效
      
      let username = document.getElementById("user").value.trim();
      let pwd = document.getElementById("pwd").value;
      let pwd2 = document.getElementById("pwd2").value;

      // 简单验证
      if(!username || !pwd || pwd !== pwd2){
        alert("请填写完整，两次密码一致");
        return;
      }

      // 写入云端数据库
      let { data, error } = await supabase.from("users").insert([
        { username: username, password: pwd, userid: Math.random().toString(36).slice(2) }
      ]);

      if(error){
        alert("注册失败："+error.message);
      }else{
        alert("注册成功！现在去登录");
      }
    }

    // 登录函数
    async function login() {
      let username = document.getElementById("login_user").value;
      let pwd = document.getElementById("login_pwd").value;
      
      let { data } = await supabase.from("users").select("*").eq("username", username).eq("password", pwd).single();
      
      if(data){
        alert("登录成功！");
        document.body.innerHTML = "<h2>登录成功！云端功能正常✅</h2>";
      }else{
        alert("账号密码错误");
      }
    }
  </script>
</body>
</html>
