<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>在线客服</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, sans-serif;}
    body {max-width: 900px; margin: 10px auto; padding: 0 10px; background: #f5f7fa;}
    .container {display: flex; gap: 10px; height: calc(100vh - 20px); max-height: 700px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; background: #fff;}
    .sidebar {width: 240px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 10px; display: none;}
    .sidebar h4 {padding: 10px; margin-bottom: 10px; color: #1e293b; font-size: 16px; display: flex; justify-content: space-between; align-items: center;}
    .badge {background: #ef4444; color: white; font-size: 12px; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center;}
    .conv-item {padding: 10px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; background: #fff; border: 1px solid #e2e8f0; font-size: 14px; position: relative;}
    .conv-item.active {background: #dbeafe; border-color: #3b82f6;}
    .conv-nick {font-weight: 500; margin-bottom: 2px;}
    .conv-id {font-size: 12px; color: #64748b;}
    .chat-main {flex: 1; display: flex; flex-direction: column; background: #fff; min-width: 0;}
    .header {padding: 12px 15px; background: #2563eb; color: white; font-weight: 500; font-size: 16px; flex-shrink: 0;}
    #chat-box {flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; min-height: 0;}
    .msg {margin: 10px 0; padding: 9px 13px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word;}
    .msg small {display: block; font-size: 11px; margin-top: 6px; opacity: 0.8;}
    .msg-img {max-width: 100%; max-height: 220px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; object-fit: contain; background: #f1f5f9;}
    .user {background: #2563eb; color: white; margin-left: auto; text-align: right;}
    .admin {background: #ffffff; border: 1px solid #e2e8f0; margin-right: auto; color: #1e293b;}
    /* 输入区布局优化，保证按钮永远显示 */
    .input-area {display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px; border-top: 1px solid #eee; background: #fff; flex-shrink: 0;}
    .input-row {display: flex; align-items: center; gap: 8px; width: 100%;}
    input[type="text"] {flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; min-width: 80px;}
    input[type="file"] {display: none;}
    .icon-btn {flex-shrink: 0; padding: 10px 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 18px; line-height: 1;}
    button {flex-shrink: 0; padding: 10px 18px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; white-space: nowrap;}
    button:hover {background: #1d4ed8;}
    .tip {font-size: 13px; color: #666; margin: 8px 0; text-align: center;}
    .preview-img {flex-shrink: 0; max-height: 40px; border-radius: 4px; border: 1px solid #ddd; object-fit: contain; margin-left: 6px;}
    .modal {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999;}
    .modal-content {background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 360px;}
    .modal-content h3 {margin-bottom: 15px; color: #1e293b;}
    .modal-content input {width: 100%; margin-bottom: 12px;}
    .hidden {display: none !important;}
    #imgZoomModal {position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:1000; cursor:pointer;}
    #imgZoomModal img {max-width:90%; max-height:90%; border-radius:8px;}
  </style>
</head>
<body>
  <!-- 注册弹窗 -->
  <div id="registerModal" class="modal hidden">
    <div class="modal-content">
      <h3>请先填写您的信息</h3>
      <input type="text" id="nickname" placeholder="请输入您的昵称" required>
      <input type="text" id="contact" placeholder="联系方式（可选）">
      <button onclick="submitRegister()" style="width:100%;">进入聊天</button>
    </div>
  </div>

  <!-- 图片放大弹窗 -->
  <div id="imgZoomModal" class="hidden" onclick="this.classList.add('hidden')">
    <img id="zoomImg" src="" alt="放大图片">
  </div>

  <div class="container" id="app-container">
    <!-- 管理员侧边栏 -->
    <div class="sidebar" id="sidebar">
      <h4>对话列表 <span id="totalUnread" class="badge hidden">0</span></h4>
      <div id="conv-list"></div>
    </div>
    <!-- 聊天主区域 -->
    <div class="chat-main">
      <div class="header" id="page-title">在线客服</div>
      <div id="chat-box"></div>
      <div class="input-area">
        <label for="imgInput" class="icon-btn" title="发送图片">📎</label>
        <input type="file" id="imgInput" accept="image/png,image/jpeg,image/gif,image/webp">
        <div id="previewArea" style="display: flex; align-items: center;"></div>
        <div class="input-row">
          <input type="text" id="msg-input" placeholder="输入消息...按回车可直接发送">
          <button onclick="sendMessage()" title="发送消息">发送</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tip">
    访客入口：当前页面<br>
    管理员入口：链接后加 ?key=MySecurePass2026
  </div>

  <script>
    const ADMIN_KEY = "MySecurePass2026";
    const MAX_IMG_SIZE = 600 * 1024;
    const firebaseConfig = {
      apiKey: "AIzaSyCKdyYzaPpl92RjFQQmI8oLZxJAOTXZ7p4",
      authDomain: "lifengshou99999.firebaseapp.com",
      databaseURL: "https://lifengshou99999-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "lifengshou99999",
      messagingSenderId: "356014471592",
      appId: "1:356014471592:web:e01d2ce14cd2a93a42859d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get("key") === ADMIN_KEY;
    let currentConvId = null;
    let selectedImageBase64 = null;
    let unreadCount = {};

    if (!isAdmin) {
      const saved = localStorage.getItem("userInfo");
      if (!saved) {
        document.getElementById("registerModal").classList.remove("hidden");
      } else {
        currentConvId = localStorage.getItem("conv_id");
        loadMessages();
      }
    } else {
      document.getElementById("page-title").textContent = "客服管理后台";
      document.getElementById("sidebar").style.display = "block";
      loadConversations();
    }

    function submitRegister() {
      const nickname = document.getElementById("nickname").value.trim();
      const contact = document.getElementById("contact").value.trim();
      if (!nickname) return alert("请填写昵称");

      const convId = "conv_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
      localStorage.setItem("conv_id", convId);
      localStorage.setItem("userInfo", JSON.stringify({ nickname, contact }));

      db.ref(`chats/${convId}/info`).set({
        nickname,
        contact: contact || "未填写",
        joinTime: Date.now()
      });

      document.getElementById("registerModal").classList.add("hidden");
      currentConvId = convId;
      loadMessages();
    }

    document.getElementById("imgInput").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > MAX_IMG_SIZE) {
        return alert(`图片过大！请选择小于${MAX_IMG_SIZE/1024}KB的图片`);
      }
      const reader = new FileReader();
      reader.onload = ev => {
        selectedImageBase64 = ev.target.result;
        document.getElementById("previewArea").innerHTML = `<img src="${selectedImageBase64}" class="preview-img" alt="预览">`;
      };
      reader.readAsDataURL(file);
    });

    function loadConversations() {
      const listEl = document.getElementById("conv-list");
      db.ref("chats").on("value", snapshot => {
        listEl.innerHTML = "";
        let total = 0;
        snapshot.forEach(convSnap => {
          const convId = convSnap.key;
          const info = convSnap.child("info").val() || { nickname: "访客" };
          const unread = unreadCount[convId] || 0;
          total += unread;

          const div = document.createElement("div");
          div.className = `conv-item ${convId === currentConvId ? "active" : ""}`;
          div.innerHTML = `
            <div class="conv-nick">${info.nickname} ${unread ? `<span class="badge" style="float:right;">${unread}</span>` : ""}</div>
            <div class="conv-id">${convId.slice(5,13)}...</div>
          `;
          div.onclick = () => switchConv(convId);
          listEl.appendChild(div);
        });
        document.getElementById("totalUnread").textContent = total;
        document.getElementById("totalUnread").classList.toggle("hidden", total === 0);
      });
    }

    function switchConv(convId) {
      currentConvId = convId;
      unreadCount[convId] = 0;
      document.getElementById("chat-box").innerHTML = "";
      document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
      event.currentTarget.classList.add("active");
      loadMessages();
    }

    function loadMessages() {
      if (!currentConvId) return;
      const box = document.getElementById("chat-box");
      const msgRef = db.ref(`chats/${currentConvId}/messages`);
      msgRef.off("child_added");
      msgRef.on("child_added", snap => {
        const d = snap.val();
        const div = document.createElement("div");
        div.className = `msg ${d.from}`;
        const time = new Date(d.time).toLocaleString("zh-CN", {hour:"2-digit", minute:"2-digit"});
        let content = "";
        if (d.image) {
          content += `<img src="${d.image}" class="msg-img" alt="图片" loading="lazy" onerror="this.outerHTML='<div style=\"padding:10px; color:#888; background:#f1f5f9; border-radius:8px;\">图片加载失败</div>'" onclick="zoomImage('${d.image.replace(/'/g, "\\'")}')">`;
        }
        if (d.text) {
          content += `<div style="margin-top:${d.image ? '8px' : '0'};">${d.text}</div>`;
        }
        content += `<small>${time}</small>`;
        div.innerHTML = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      });
    }

    function zoomImage(src) {
      document.getElementById("zoomImg").src = src;
      document.getElementById("imgZoomModal").classList.remove("hidden");
    }

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text && !selectedImageBase64) return;
      if (!currentConvId) return;

      const msgData = {
        from: isAdmin ? "admin" : "user",
        time: Date.now()
      };
      if (text) msgData.text = text;
      if (selectedImageBase64) msgData.image = selectedImageBase64;

      db.ref(`chats/${currentConvId}/messages`).push(msgData);

      input.value = "";
      selectedImageBase64 = null;
      document.getElementById("previewArea").innerHTML = "";
      document.getElementById("imgInput").value = "";
    }

    // 支持回车直接发送
    document.getElementById("msg-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
