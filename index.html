<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机自适应、全屏适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友内部聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f2f3f5; max-width: 720px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .top-bar {
            background: #fff; padding: 12px; text-align: center;
            border-bottom: 1px solid #eee; font-size: 16px; font-weight: bold;
        }
        .tool-bar {
            display: flex; gap: 8px; padding: 8px; background: #fff; border-bottom: 1px solid #eee;
        }
        .tool-bar button {
            flex: 1; padding: 6px; border: none; border-radius: 4px;
            background: #e8e8e8; cursor: pointer; font-size: 14px;
        }
        .chat-container {
            flex: 1; padding: 10px; overflow-y: auto;
        }
        .msg-item { margin: 10px 0; max-width: 75%; }
        .msg-left { margin-right: auto; }
        .msg-right { margin-left: auto; text-align: right; }
        .msg-name { font-size: 12px; color: #999; margin-bottom: 2px; padding: 0 8px; }
        .msg-content {
            padding: 8px 12px; border-radius: 12px; word-break: break-all;
        }
        .msg-left .msg-content { background: #fff; }
        .msg-right .msg-content { background: #95ec69; }
        .input-area {
            display: flex; gap: 8px; padding: 10px; background: #fff; border-top: 1px solid #eee;
        }
        #nick { width: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #msgInput {
            flex: 1; padding: 10px 16px; border: 1px solid #ddd;
            border-radius: 20px; outline: none;
        }
        #sendBtn {
            padding: 10px 16px; border: none; border-radius: 20px;
            background: #07c160; color: #fff; cursor: pointer;
        }
        /* 隐藏原生文件输入 */
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">好友内部私密聊天</div>
    <div class="tool-bar">
        <button onclick="exportData()">导出聊天记录</button>
        <button onclick="document.getElementById('fileInput').click()">导入聊天记录</button>
        <button onclick="clearAllMsg()">清空本地记录</button>
    </div>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="nick" placeholder="你的昵称">
        <input type="text" id="msgInput" placeholder="输入消息...">
        <button id="sendBtn" onclick="sendMsg()">发送</button>
    </div>

<script>
    // 本地存储键名
    const STORAGE_KEY = "friend_chat_data";
    let chatList = [];

    // 页面加载时读取本地记录
    window.onload = function() {
        let localData = localStorage.getItem(STORAGE_KEY);
        if(localData) chatList = JSON.parse(localData);
        renderChat();
    }

    // 渲染聊天界面
    function renderChat() {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        chatList.forEach(item => {
            const isSelf = item.nick === document.getElementById("nick").value.trim();
            const cls = isSelf ? "msg-right" : "msg-left";
            box.innerHTML += `
                <div class="msg-item ${cls}">
                    <div class="msg-name">${item.nick} · ${item.time}</div>
                    <div class="msg-content">${item.content}</div>
                </div>
            `;
        });
        // 滚动到最底部
        box.scrollTop = box.scrollHeight;
    }

    // 发送消息
    function sendMsg() {
        const nick = document.getElementById("nick").value.trim();
        const content = document.getElementById("msgInput").value.trim();
        if(!nick || !content) {
            alert("请填写昵称和消息内容！");
            return;
        }
        // 组装消息
        const now = new Date();
        const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        chatList.push({ nick, content, time });
        // 保存到本地
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chatList));
        document.getElementById("msgInput").value = "";
        renderChat();
    }

    // 导出聊天记录为文件
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(chatList));
        const a = document.createElement("a");
        a.href = dataStr;
        a.download = "聊天记录.json";
        a.click();
    }

    // 导入聊天记录
    function importData(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const newData = JSON.parse(ev.target.result);
                // 合并新旧记录（去重简易处理）
                chatList = [...chatList, ...newData];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chatList));
                renderChat();
                alert("导入成功！");
            } catch(err) {
                alert("文件格式错误！");
            }
        }
        reader.readAsText(file);
        // 清空文件选择，避免重复选择同一文件无响应
        e.target.value = "";
    }

    // 清空本地记录
    function clearAllMsg() {
        if(confirm("确定要清空本地所有聊天记录吗？")) {
            chatList = [];
            localStorage.removeItem(STORAGE_KEY);
            renderChat();
        }
    }
</script>
</body>
</html>
