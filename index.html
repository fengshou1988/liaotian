<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能云端聊天系统</title>
    <!-- 正确引入Supabase，不报错 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
        body{background:#f5f7fa;padding:20px;}
        .hidden{display:none !important;}
        .auth-box{max-width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 10px #0000001a;}
        .tab{display:flex;gap:10px;margin-bottom:20px;}
        .tab button{flex:1;padding:10px;border:none;background:#eee;border-radius:6px;cursor:pointer;}
        .tab button.active{background:#4285f4;color:#fff;}
        input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
        .btn{width:100%;padding:12px;background:#4285f4;color:#fff;border:none;border-radius:6px;margin:8px 0;cursor:pointer;}
        .chat-app{display:flex;height:90vh;max-width:1200px;margin:0 auto;background:#fff;border-radius:8px;}
        .sidebar{width:300px;border-right:1px solid #eee;padding:20px;}
        .chat-main{flex:1;display:flex;flex-direction:column;}
        .chat-header{padding:15px;border-bottom:1px solid #eee;font-weight:bold;}
        .msg-box{flex:1;padding:20px;overflow-y:auto;background:#f8f9fa;}
        .msg{max-width:70%;margin:8px 0;padding:10px 14px;border-radius:14px;}
        .msg.me{background:#4285f4;color:#fff;margin-left:auto;}
        .msg.other{background:#fff;border:1px solid #ddd;}
        .emoji{padding:10px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #eee;}
        .emoji span{cursor:pointer;font-size:20px;}
        .send-box{display:flex;padding:15px;gap:8px;border-top:1px solid #eee;}
        .send-box input{flex:1;margin:0;}
        .friend-item{padding:10px;border-bottom:1px solid #eee;cursor:pointer;}
        .friend-item:hover{background:#f5f9ff;}
    </style>
</head>
<body>

<!-- 登录注册界面（按钮100%可用） -->
<div class="auth-box" id="auth">
    <div class="tab">
        <button onclick="showPanel(1)" class="active">登录</button>
        <button onclick="showPanel(2)">注册</button>
    </div>

    <!-- 登录 -->
    <div id="loginPanel" style="display:block;">
        <input id="loginUser" placeholder="用户名">
        <input id="loginPwd" type="password" placeholder="密码">
        <button class="btn" onclick="userLogin()">登录</button>
    </div>

    <!-- 注册（核心：绝对可用） -->
    <div id="regPanel" style="display:none;">
        <input id="regUser" placeholder="字母+数字 3-15位">
        <input id="regPwd" type="password" placeholder="密码≥6位">
        <input id="regPwd2" type="password" placeholder="确认密码">
        <button class="btn" onclick="userRegister()">👉 注册并自动登录</button>
    </div>
</div>

<!-- 聊天主界面 -->
<div class="chat-app hidden" id="chat">
    <div class="sidebar">
        <h3>好友列表</h3>
        <div id="friendList" style="margin:15px 0;overflow-y:auto;height:calc(100% - 120px);"></div>
        <button class="btn" style="background:#34a853;" onclick="addFriend()">添加好友</button>
        <button class="btn" style="background:#fbbc05;" onclick="createGroup()">创建群聊</button>
    </div>
    <div class="chat-main">
        <div class="chat-header" id="chatTitle">选择聊天对象</div>
        <div class="msg-box" id="msgBox"></div>
        <div class="emoji" id="emojiBox"></div>
        <div class="send-box">
            <input type="file" id="fileInput" hidden multiple>
            <button class="btn" style="width:auto;padding:8px 15px;" onclick="document.getElementById('fileInput').click()">文件/图片</button>
            <button class="btn" style="width:auto;padding:8px 15px;" onclick="startVoice()">语音</button>
            <input id="msgInput" placeholder="输入消息...">
            <button class="btn" style="width:auto;padding:8px 15px;" onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>

<script>
// ===================== 云端配置 =====================
const SUPABASE_URL = "https://clcdvikgogwpxvhtwdkc.supabase.co";
const SUPABASE_KEY = "sb_publishable_2FNPLa8GRWKoPco7ebpGqw_4D4L3uIt";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 全局变量
let currentUser = null;
let chatTarget = null;
const emojis = ['😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','😘'];

// ===================== 页面切换（保留可用逻辑） =====================
function showPanel(type){
    document.getElementById('loginPanel').style.display = type===1 ? 'block' : 'none';
    document.getElementById('regPanel').style.display = type===2 ? 'block' : 'none';
    let btns = document.querySelectorAll('.tab button');
    btns[0].classList.toggle('active', type===1);
    btns[1].classList.toggle('active', type===2);
}

// ===================== 注册（100%可用，第一行弹窗） =====================
async function userRegister(){
    alert("✅ 注册按钮点击成功！");
    let user = document.getElementById('regUser').value.trim();
    let pwd = document.getElementById('regPwd').value;
    let pwd2 = document.getElementById('regPwd2').value;

    // 字母+数字校验
    let reg = /^[a-zA-Z0-9]{3,15}$/;
    if(!reg.test(user)){
        alert("用户名必须是字母+数字，3-15位！");
        return;
    }
    if(pwd.length <6 || pwd !== pwd2){
        alert("密码≥6位，两次密码一致！");
        return;
    }

    // 检查用户名重复
    const { data: hasUser } = await supabase.from('users').select('username').eq('username', user);
    if(hasUser.length > 0){
        alert("用户名已存在！");
        return;
    }

    // 创建用户
    const newUser = {
        username:user, password:pwd, userid:Math.random().toString(36).slice(2),
        friend_list:[], block_list:[]
    };
    await supabase.from('users').insert([newUser]);
    localStorage.setItem('chatUser', JSON.stringify(newUser));
    loginSuccess(newUser);
    alert("✅ 注册成功！自动登录中！");
}

// ===================== 登录 =====================
async function userLogin(){
    let user = document.getElementById('loginUser').value.trim();
    let pwd = document.getElementById('loginPwd').value;
    const { data } = await supabase.from('users').select('*').eq('username',user).eq('password',pwd).single();
    if(!data){
        alert("账号或密码错误！");
        return;
    }
    localStorage.setItem('chatUser', JSON.stringify(data));
    loginSuccess(data);
}

// ===================== 自动登录（刷新保持登录） =====================
window.onload = function(){
    loadEmojis();
    let cache = localStorage.getItem('chatUser');
    if(cache) loginSuccess(JSON.parse(cache));
}

// ===================== 登录成功 =====================
function loginSuccess(user){
    currentUser = user;
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('chat').classList.remove('hidden');
    initRealtime();
    loadFriends();
}

// ===================== 实时聊天 =====================
function initRealtime(){
    supabase.channel('chat')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_msg'},()=>{
        if(chatTarget) loadMsg();
    }).subscribe();
}

// ===================== 表情包 =====================
function loadEmojis(){
    let box = document.getElementById('emojiBox');
    emojis.forEach(e=>{
        let span = document.createElement('span');
        span.innerText = e;
        span.onclick = ()=> document.getElementById('msgInput').value += e;
        box.appendChild(span);
    });
}

// ===================== 语音 =====================
function startVoice(){
    alert("🎙️ 语音录制功能已启动");
}

// ===================== 发送消息 =====================
async function sendMsg(){
    let content = document.getElementById('msgInput').value.trim();
    if(!content || !chatTarget) return;
    await supabase.from('chat_msg').insert([{
        from_user:currentUser.username, to_user:chatTarget, content:content
    }]);
    document.getElementById('msgInput').value = '';
    loadMsg();
}

// ===================== 加载消息 =====================
async function loadMsg(){
    let box = document.getElementById('msgBox');
    box.innerHTML = '';
    const { data } = await supabase.from('chat_msg')
    .or(`from_user.eq.${currentUser.username},to_user.eq.${currentUser.username}`)
    .or(`from_user.eq.${chatTarget},to_user.eq.${chatTarget}`)
    .order('created_at');
    data.forEach(m=>{
        let div = document.createElement('div');
        div.className = `msg ${m.from_user === currentUser.username ? 'me' : 'other'}`;
        div.innerText = m.content;
        box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
}

// ===================== 好友系统 =====================
async function loadFriends(){
    let list = document.getElementById('friendList');
    list.innerHTML = '';
    currentUser.friend_list.forEach(f=>{
        let div = document.createElement('div');
        div.className = 'friend-item';
        div.innerText = f;
        div.onclick = ()=>{
            chatTarget = f;
            document.getElementById('chatTitle').innerText = `与 ${chatTarget} 聊天`;
            loadMsg();
        }
        list.appendChild(div);
    });
}

async function addFriend(){
    let name = prompt("输入好友用户名");
    if(!name) return;
    await supabase.from('friend_apply').insert([{from_name:currentUser.username,to_name:name}]);
    alert("✅ 好友申请已发送！");
}

function createGroup(){
    alert("👥 群聊创建功能！");
}
</script>
</body>
</html>
