<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信联系面板</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/bootstrap/5.3.0/css/bootstrap.min.css">
    <script src="https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {--primary: #07c160; --dark: #1f2937; --light: #f8fafc; --gray: #6b7280;}
        body {background: #f5f7fa; font-family: system-ui, "PingFang SC", "Microsoft YaHei";}
        .dashboard {max-width: 680px; margin: 2.5rem auto; padding: 0 1.2rem;}
        .card {background: #fff; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.07); margin-bottom: 1.8rem;}
        .card-header {padding: 1.2rem 1.5rem; border-bottom: 1px solid #f0f2f5; font-weight: 600;}
        .card-body {padding: 1.8rem 1.5rem; text-align: center;}
        .wx-id {font-size: 1.15rem; font-weight: 500; background: #f0fdf4; padding: .8rem; border-radius: 8px; display: inline-block; margin-bottom: 1.5rem;}
        .btn-main {width: 100%; padding: 1rem; font-size: 1.1rem; background: var(--primary); color: #fff; border: none; border-radius: 10px; margin-bottom: 1.8rem;}
        #qrcode {margin: 0 auto; width: 170px; height: 170px;}
        .tip {font-size: .9rem; color: var(--gray); margin-top: 1rem;}
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="text-center mb-4">
            <h2>💬 微信联系我</h2>
            <p class="text-muted">复制ID或扫码 → 打开微信即可聊天</p>
        </div>

        <div class="card">
            <div class="card-header">我的微信号</div>
            <div class="card-body">
                <div class="wx-id">wxid_ybai3aviwlen22</div>

                <button class="btn-main" onclick="copyWx()">📋 一键复制微信号</button>

                <!-- 改成网页二维码，不再用协议链接 -->
                <div id="qrcode"></div>
                <p class="tip">📱 微信扫码：打开此联系页面<br>然后复制ID搜索添加</p>

                <div class="alert alert-success mt-3">
                    ✅ 稳定方式：复制ID → 微信 → 右上角+ → 添加朋友 → 粘贴搜索
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">ℹ️ 正确操作步骤</div>
            <div class="card-body text-start small text-muted">
                <ul>
                    <li><strong>手机浏览器打开：</strong>点“复制” → 自动复制 → 打开微信粘贴搜索</li>
                    <li><strong>微信内扫码：</strong>打开这个页面 → 再复制ID去搜索</li>
                    <li><strong>电脑端：</strong>扫码打开页面 → 复制ID → 电脑微信添加</li>
                    <li><strong>说明：</strong>微信没有开放“扫码直接进私聊”的功能，这是官方限制，不是你的代码问题</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const WX_ID = "wxid_ybai3aviwlen22";
        // ✅ 关键修复：二维码放你的网页链接，不是协议链接
        const PAGE_URL = window.location.href || "https://你的用户名.gitee.io/你的仓库名/";

        new QRCode(document.getElementById("qrcode"), {
            text: PAGE_URL,
            width: 170,
            height: 170
        });

        function copyWx() {
            navigator.clipboard.writeText(WX_ID)
                .then(() => alert("✅ 微信号已复制！打开微信 → 右上角+ → 添加朋友 → 粘贴即可"))
                .catch(() => prompt("手动复制微信号：", WX_ID));
        }
    </script>
</body>
</html>
